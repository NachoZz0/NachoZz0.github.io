<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>无权限访问</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      font-family: "Microsoft YaHei", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: url("https://pic1.imgdb.cn/item/6815596458cb8da5c8d71569.png") no-repeat center center;
      background-size: cover;
      filter: blur(8px);
      z-index: -1;
    }

    .container {
      text-align: center;
      background-color: rgba(255, 255, 255, 0.75);
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      z-index: 1;
      max-width: 90%;
    }

    .message {
      font-size: 24px;
      color: #dc3545;
      margin-bottom: 20px;
    }

    .note {
      font-size: 16px;
      color: #6c757d;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: background-color 0.3s;
    }

    .btn:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="message">您暂无权限访问本页面</div>
    <div class="note">请联系管理员获取访问权限。</div>
    <a href="/index.html" class="btn">返回首页</a>
  </div>
</body>
</html>
